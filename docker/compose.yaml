---
services:
  app:
    image: ghcr.io/teqneers/phpknock:dev
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - "80:80"
      - "443:443"
    environment:
      PHPKNOCK_SERVER_PORT: "62201"
      PHPKNOCK_ACCESS_PORT_LIST: tcp/22
      #PHPKNOCK_USE_HTTPS_ONLY: "true"
      #PHPKNOCK_ENCRYPTION_KEY: secret      # omit to prompt user in browser
      #PHPKNOCK_DESTINATION: 10.0.0.1       # single fixed destination
      #PHPKNOCK_DESTINATION: '{"10.0.0.1":"prod","10.0.0.2":"dev"}'  # dropdown
      #PHPKNOCK_ERRORS_VERBOSE: "false"
      #PHPKNOCK_ERRORS_LOG: /web/log/error.log       # path to error log (default: /web/log/error.log)
      #PHPKNOCK_AUDIT_LOG: /web/log/audit.log        # path to audit log (default: /web/log/audit.log)
      #PHPKNOCK_RATE_LIMIT: "10"            # max knock attempts per window (default: 10)
      #PHPKNOCK_RATE_WINDOW: "60"           # rate limit window in seconds (default: 60)
      #PHPKNOCK_ENCRYPTION_MODE: rijndael   # 'rijndael' (default) or 'gpg'
      #PHPKNOCK_HMAC_ENABLED: "false"       # enable HMAC authentication (Rijndael only)
      #PHPKNOCK_HMAC_KEY: secret            # fixed HMAC key; omit to prompt user in browser
      #PHPKNOCK_HMAC_DIGEST_TYPE: sha256    # md5, sha1, sha256 (default), sha384, sha512
      #PHPKNOCK_GPG_RECIPIENT_KEY: ABCD1234 # server's GPG key ID (required for GPG mode)
      #PHPKNOCK_GPG_SIGNER_KEY: EFGH5678   # client's GPG key ID (required for GPG mode)
      #PHPKNOCK_GPG_HOME_DIR: /path/.gnupg  # GPG keyring path; omit for system default
    volumes:
      - ../app:/web/app:ro
      - ../log:/web/log

# vim: syntax=yaml ts=2 sw=2 et sr softtabstop=2 autoindent
